<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Business Details — LocalServe</title>

<style>
:root{
  --bg:#f4f7fc;
  --card:#fff;
  --accent:#357edd;
  --muted:#64748b;
  --radius:16px;
  --shadow:0 12px 40px rgba(0,0,0,.08);
}

body{
  margin:0;
  font-family:Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:#111;
  padding:20px;
}

.wrap{max-width:1000px;margin:auto}

.back a{
  text-decoration:none;
  color:var(--accent);
  font-weight:600;
}

/* PANEL */
.panel{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:24px;
  display:grid;
  grid-template-columns:420px 1fr;
  gap:24px;
}

@media(max-width:900px){
  .panel{grid-template-columns:1fr}
}

/* GALLERY */
.main{
  width:100%;
  height:380px;
  object-fit:cover;
  border-radius:12px;
  cursor:zoom-in;
}

.thumbs{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.thumbs img{
  width:80px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
}

.thumbs img.selected{
  border-color:var(--accent);
}

/* INFO */
h1{margin:0 0 6px}

.badge{
  display:inline-block;
  background:#e7f0ff;
  color:var(--accent);
  padding:4px 10px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:10px;
}

.stars{color:gold}

.price{
  color:var(--accent);
  font-weight:700;
  margin:6px 0;
}

.desc{
  color:var(--muted);
  line-height:1.6;
  margin:12px 0;
}

/* SERVICES */
.services ul{
  margin-left:18px;
  color:var(--muted);
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 18px;
  border-radius:10px;
  border:0;
  cursor:pointer;
  font-weight:600;
}

.primary{background:var(--accent);color:white}
.ghost{background:white;border:1px solid #ddd}

/* ZOOM VIEW */
.zoom-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  align-items:center;
  justify-content:center;
  z-index:999;
}

.zoom-overlay img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="wrap">
<a href="Business listings.html" class="back">← Back to listings</a>

<section class="panel">

<!-- GALLERY -->
<div>
<img id="mainImage" class="main"/>
<div id="thumbs" class="thumbs"></div>
</div>

<!-- INFO -->
<div>
<span class="badge">Verified Business</span>
<h1 id="name"></h1>
<div id="stars" class="stars"></div>
<div id="price" class="price"></div>
<div id="desc" class="desc"></div>

<div id="services" class="services"></div>

<div class="actions">
<button id="whatsapp" class="btn primary">WhatsApp</button>
<button id="call" class="btn ghost">Call</button>
<button id="rate" class="btn ghost">Rate</button>
<button id="share" class="btn ghost">Share</button>
</div>
</div>

</section>
</div>

<div class="zoom-overlay" id="zoom">
<img id="zoomImg">
</div>

<script>

/* =========================
   BUSINESS DATABASE
   (Same data as listings page)
========================= */

const BUSINESSES={
BreadBaddie:{
name:"Bread Baddie",
images:["images/Bannana Bread.jpg","images/Scones.jpg","images/Baking_Baddie.jpg"],
stars:5,
desc:"We are a bespoke bakery specialising in artisan banana bread, scones and crunchies.",
price:"R200 – R350",
services:["Banana Bread","Scones","Crunchies"],
phone:"27814343732"
},

MaposCakesandBakes:{
name:"Mapos Cakes and Bakes",
images:["images/Cupcakes.jpg","images/Birthday M.jpg","images/Mapos.jpg"],
stars:4,
desc:"For all your customized cakes, scones, muffins and cinnamon rolls.",
price:"R300 – R800",
services:["Custom Cakes","Muffins","Event Orders"],
phone:"27781314590"
}
};


/* =========================
   GET BUSINESS FROM URL
========================= */

const params=new URLSearchParams(location.search);
const key=params.get("biz")||"BreadBaddie";
const biz=BUSINESSES[key]||BUSINESSES.BreadBaddie;


/* =========================
   POPULATE INFO
========================= */

document.getElementById("name").textContent=biz.name;
document.getElementById("price").textContent=biz.price;
document.getElementById("desc").textContent=biz.desc;

document.getElementById("stars").textContent=
"★".repeat(biz.stars)+"☆".repeat(5-biz.stars);

document.getElementById("services").innerHTML=
"<strong>Services</strong><ul>"+
biz.services.map(s=>"<li>"+s+"</li>").join("")+"</ul>";



/* =========================
   IMAGE GALLERY
========================= */

const main=document.getElementById("mainImage");
const thumbs=document.getElementById("thumbs");

main.src=biz.images[0];

biz.images.forEach((img,i)=>{
const t=document.createElement("img");
t.src=img;
if(i===0)t.classList.add("selected");

t.onclick=()=>{
main.src=img;
document.querySelectorAll(".thumbs img")
.forEach(x=>x.classList.remove("selected"));
t.classList.add("selected");
};

thumbs.appendChild(t);
});


/* =========================
   IMAGE ZOOM
========================= */

const zoom=document.getElementById("zoom");
const zoomImg=document.getElementById("zoomImg");

main.onclick=()=>{
zoom.style.display="flex";
zoomImg.src=main.src;
};

zoom.onclick=()=>zoom.style.display="none";


/* =========================
   CONTACT BUTTONS
========================= */

document.getElementById("whatsapp").onclick=()=>{
const msg=encodeURIComponent("Hi I'm interested in "+biz.name);
window.open(`https://wa.me/${biz.phone}?text=${msg}`);
};

document.getElementById("call").onclick=()=>{
window.location.href="tel:"+biz.phone;
};


/* =========================
   RATING SYSTEM
========================= */

document.getElementById("rate").onclick=()=>{
const r=prompt("Rate 1-5");
const v=parseInt(r);
if(v>=1 && v<=5){
localStorage.setItem("rating_"+key,v);
alert("Rating saved");
}
};


/* =========================
   SHARE BUTTON
========================= */

document.getElementById("share").onclick=()=>{
navigator.clipboard.writeText(location.href);
alert("Link copied");
};

</script>

</body>
</html>
