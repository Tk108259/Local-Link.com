<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Business Details — LocalServe</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --accent:#7c3aed;
  --accent2:#5b21b6;
  --muted:#6b7280;
  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

body{
  margin:0;
  font-family:Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:#111;
  padding:20px;
}

.wrap{max-width:1000px;margin:auto}

.back{
  display:inline-block;
  margin-bottom:12px;
  text-decoration:none;
  color:var(--accent);
  font-weight:600;
}

/* PANEL */
.panel{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:24px;
  display:grid;
  grid-template-columns:420px 1fr;
  gap:28px;
}

@media(max-width:900px){
  .panel{grid-template-columns:1fr}
}

/* GALLERY */
.main{
  width:100%;
  height:380px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
  transition:opacity .2s;
}

.thumbs{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.thumbs img{
  width:90px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
  cursor:pointer;
  border:3px solid transparent;
}

.thumbs img.selected{
  border-color:var(--accent);
}

/* INFO */
h1{
  margin:8px 0 6px;
  font-size:32px;
}

.rating-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.stars{
  color:#fbbf24;
  font-size:18px;
}

.price{
  color:var(--accent);
  font-weight:700;
}

.desc{
  color:var(--muted);
  line-height:1.6;
  margin:14px 0;
}

/* SERVICES */
.services strong{
  display:block;
  margin-bottom:6px;
}

.services ul{
  margin-left:18px;
  color:var(--muted);
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:18px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 18px;
  border-radius:12px;
  border:0;
  cursor:pointer;
  font-weight:600;
}

.primary{
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:white;
}

.ghost{
  background:white;
  border:1px solid #e5e7eb;
}

.favorite{
  font-size:20px;
}

/* MAP */
.map{
  margin-top:20px;
  border-radius:14px;
  overflow:hidden;
  height:260px;
}

/* ZOOM */
.zoom-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;
  justify-content:center;
}

.zoom-overlay img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="wrap">
<a href="Business listings.html" class="back">← Back to listings</a>

<section class="panel">

<!-- GALLERY -->
<div>
<img id="mainImage" class="main"/>
<div id="thumbs" class="thumbs"></div>
</div>

<!-- INFO -->
<div>

<h1 id="name"></h1>

<div class="rating-row">
<div id="stars" class="stars"></div>
<div id="price" class="price"></div>
</div>

<div id="desc" class="desc"></div>
<div id="services" class="services"></div>

<div class="actions">
<button id="whatsapp" class="btn primary">Contact on WhatsApp</button>
<button id="order" class="btn primary">Order</button>
<button id="favorite" class="btn ghost favorite">♡</button>
<button id="rate" class="btn ghost">Rate</button>
<button id="share" class="btn ghost">Share</button>
</div>

<div class="map">
<iframe id="mapFrame" width="100%" height="100%" frameborder="0" style="border:0"></iframe>
</div>

</div>

</section>
</div>

<div class="zoom-overlay" id="zoom">
<img id="zoomImg">
</div>

<script>

/* DATABASE */
const BUSINESSES={
BreadBaddie:{
name:"Bread Baddie",
images:["images/Bannana Bread.jpg","images/Scones.jpg","images/Baking_Baddie.jpg"],
stars:5,
desc:"Bespoke bakery specialising in artisan banana bread, scones and crunchies.",
price:"R150",
services:["Banana bread","Scones","Cookies & crunchies"],
Whatsapp:"27814343732",
location:"Johannesburg South Africa"
}
};


/* GET BUSINESS */
const key="BreadBaddie";
const biz=BUSINESSES[key];

/* POPULATE */
name.textContent=biz.name;
price.textContent=biz.price;
desc.textContent=biz.desc;

stars.textContent="★".repeat(biz.stars)+"☆".repeat(5-biz.stars);

services.innerHTML="<strong>Services</strong><ul>"+
biz.services.map(s=>"<li>"+s+"</li>").join("")+"</ul>";


/* GALLERY */
mainImage.src=biz.images[0];

biz.images.forEach((img,i)=>{
const t=document.createElement("img");
t.src=img;
if(i===0)t.classList.add("selected");

t.onclick=()=>{
mainImage.style.opacity=0;
setTimeout(()=>{
mainImage.src=img;
mainImage.style.opacity=1;
},150);

document.querySelectorAll(".thumbs img")
.forEach(x=>x.classList.remove("selected"));
t.classList.add("selected");
};

thumbs.appendChild(t);
});


/* ZOOM */
mainImage.onclick=()=>{
zoom.style.display="flex";
zoomImg.src=mainImage.src;
};

zoom.onclick=()=>zoom.style.display="none";


/* WHATSAPP */
whatsapp.onclick=()=>{
const msg=encodeURIComponent("Hi I'm interested in "+biz.name);
window.open(`https://wa.me/${biz.Whatsapp}?text=${msg}`);
};

/* ORDER */
order.onclick=()=>{
const msg=encodeURIComponent("Hi I'd like to place an order for "+biz.name);
window.open(`https://wa.me/${biz.Whatsapp}?text=${msg}`);
};


/* FAVORITE */
const favKey="fav_"+key;

function updateFav(){
favorite.textContent=
localStorage.getItem(favKey)?"❤️":"♡";
}

favorite.onclick=()=>{
if(localStorage.getItem(favKey)){
localStorage.removeItem(favKey);
}else{
localStorage.setItem(favKey,"1");
}
updateFav();
};

updateFav();


/* RATING */
rate.onclick=()=>{
const r=prompt("Rate 1-5");
const v=parseInt(r);
if(v>=1 && v<=5){
localStorage.setItem("rating_"+key,v);
alert("Rating saved");
}
};


/* SHARE */
share.onclick=()=>{
navigator.clipboard.writeText(location.href);
alert("Link copied");
};


/* MAP */
mapFrame.src=
`https://www.google.com/maps?q=${encodeURIComponent(biz.location)}&output=embed`;

</script>

</body>
</html>
