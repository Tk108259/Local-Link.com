<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalServe – Find Local Services</title>

<link href="https://fonts.googleapis.com/css?family=Segoe+UI:400,600,700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#f4f6fb,#d1e3f7);
color:#222;
}

/* HERO */
.main-header{
background:url('images/file.jpg') center/cover no-repeat;
min-height:260px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
position:relative;
padding:40px 20px;
border-radius:0 0 36px 36px;
overflow:hidden;
}

.main-header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(24,40,72,.75),rgba(75,108,183,.65));
}

.main-header h1,
.main-header p{
position:relative;
z-index:1;
}

.main-header h1{
font-size:2rem;
margin:0;
}

.main-header p{
margin-top:10px;
opacity:.95;
}

/* CATEGORIES */
.categories{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
padding:30px 15px;
}

.category-card{
background:white;
border-radius:16px;
padding:18px 14px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,.06);
min-width:110px;
cursor:pointer;
transition:.2s;
border:2px solid transparent;
}

.category-card:hover{
transform:translateY(-4px);
box-shadow:0 12px 24px rgba(0,0,0,.08);
border-color:#4b6cb7;
}

.category-card.active{
border-color:#4b6cb7;
}

.category-card img{
width:34px;
margin-bottom:8px;
}

/* FORM */
.form-container{
background:white;
max-width:720px;
margin:20px auto;
padding:26px;
border-radius:18px;
box-shadow:0 10px 28px rgba(0,0,0,.08);
}

.form-container h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
margin-bottom:14px;
}

.form-group label{
display:block;
font-weight:600;
margin-bottom:6px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #cfd9ea;
font-size:15px;
}

.plan-options{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.plan-options label{
flex:1;
background:#f4f7ff;
padding:10px;
border-radius:10px;
cursor:pointer;
border:1px solid #e1e7f5;
}

.plan-options label:hover{
border-color:#4b6cb7;
}

/* BUTTON */
.submit-button{
width:100%;
background:linear-gradient(90deg,#4b6cb7,#182848);
color:white;
padding:14px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.submit-button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

/* IMAGE PREVIEW */
#imagePreview img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
border:2px solid #e5ecf7;
transition:.2s;
}

#imagePreview img:hover{
transform:scale(1.08);
}

#uploadLoader{
display:none;
text-align:center;
margin-top:10px;
font-weight:600;
}

</style>
</head>

<body>

<header class="main-header">
<h1>Find trusted local services near you</h1>
<p>From bakers to plumbers – all in one place</p>
</header>

<div class="categories">
<div class="category-card" data-category="Gardening">
<img src="images/gardening.png">
<div>Gardening</div>
</div>

<div class="category-card" data-category="Plumbing">
<img src="images/plumbing.png">
<div>Plumbing</div>
</div>

<div class="category-card" data-category="Electrical">
<img src="images/electrical.png">
<div>Electrical</div>
</div>

<div class="category-card" data-category="Baking">
<img src="images/baking.png">
<div>Baking</div>
</div>
</div>

<div class="form-container">
<h2>List Your Business</h2>

<form id="businessForm">

<div class="form-group">
<label>Business Name</label>
<input type="text" id="businessName" required>
</div>

<div class="form-group">
<label>Type of Service</label>
<input type="text" id="type" required>
</div>

<div class="form-group">
<label>Description</label>
<textarea id="desc" required></textarea>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Location</label>
<input type="text" id="location" required>
</div>

<div class="form-group">
<label>Plan</label>
<div class="plan-options">
<label><input type="radio" name="plan" value="Standard" checked> Standard (R200)</label>
<label><input type="radio" name="plan" value="Premium"> Premium (R300)</label>
<label><input type="radio" name="plan" value="Yearly"> Yearly (R2500)</label>
</div>
</div>

<div class="form-group">
<label>Upload Images (max 5)</label>
<input type="file" id="images" multiple accept="image/*" required>
<div id="imagePreview"></div>
</div>

<button class="submit-button">Submit Business</button>

<div id="uploadLoader">Uploading images...</div>

</form>
</div>

<script>

const CLOUD_NAME="dhv6kt5ke";
const UPLOAD_PRESET="business_images_Upload";

document.querySelectorAll('.category-card').forEach(card=>{
card.addEventListener('click',()=>{
document.querySelectorAll('.category-card')
.forEach(c=>c.classList.remove('active'));

card.classList.add('active');
document.getElementById('type').value=card.dataset.category;

document.querySelector('.form-container')
.scrollIntoView({behavior:'smooth'});
});
});

/* IMAGE PREVIEW */
const imageInput=document.getElementById("images");
const preview=document.getElementById("imagePreview");

imageInput.addEventListener("change",()=>{
preview.innerHTML="";

if(imageInput.files.length>5){
alert("Max 5 images");
imageInput.value="";
return;
}

[...imageInput.files].forEach(file=>{
const reader=new FileReader();
reader.onload=e=>{
const img=document.createElement("img");
img.src=e.target.result;
preview.appendChild(img);
};
reader.readAsDataURL(file);
});
});

/* UPLOAD */
async function uploadImage(file){
const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset",UPLOAD_PRESET);

const res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{method:"POST",body:fd}
);

const data=await res.json();
return data.secure_url;
}

/* SUBMIT */
document.getElementById("businessForm")
.addEventListener("submit",async e=>{

e.preventDefault();

document.getElementById("uploadLoader").style.display="block";

const submitBtn=document.querySelector(".submit-button");
submitBtn.disabled=true;
submitBtn.textContent="Uploading...";

const images=[...imageInput.files];

let urls=[];
for(let file of images){
const url=await uploadImage(file);
urls.push(url);
}

const data={
businessName:businessName.value,
type:type.value,
desc:desc.value,
phone:phone.value,
location:location.value,
plan:document.querySelector('input[name="plan"]:checked').value,
images:urls
  localStorage.setItem("businessData", JSON.stringify(data));
};

await fetch("https://script.google.com/macros/s/AKfycbytS33CINXpwYZvXQCoZzd238vhdSbZDjdieRBjhYwlStm9S9Ay8JieRjIHUX-i2j-Djg/exec",
{
method:"POST",
body:JSON.stringify(data)
});

window.location.href="preview.html";

});

</script>

</body>
</html>
